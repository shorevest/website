<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 736 1456" role="img" aria-labelledby="title desc">
  <title id="title">百年初心，植信为根</title>
  <desc id="desc">Chinese calligraphy reading: the founding intent, carried for a hundred years; trust as its root.</desc>
  <defs>
    <radialGradient id="paper" cx="48%" cy="34%" r="78%">
      <stop offset="0" stop-color="#173d3c"/>
      <stop offset="0.58" stop-color="#123332"/>
      <stop offset="1" stop-color="#0d2828"/>
    </radialGradient>
    <filter id="ink" x="-8%" y="-8%" width="116%" height="116%">
      <feTurbulence type="fractalNoise" baseFrequency="0.018 0.16" numOctaves="3" seed="12" result="noise"/>
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="3" xChannelSelector="R" yChannelSelector="G"/>
    </filter>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="3" stdDeviation="2" flood-color="#061616" flood-opacity="0.45"/>
    </filter>
  </defs>
  <rect width="736" height="1456" fill="url(#paper)"/>
  <g opacity="0.12" stroke="#f7f3e9" stroke-width="1">
    <path d="M72 226H664M72 480H664M72 734H664M72 988H664"/>
    <path d="M244 160V1220M492 160V1220"/>
  </g>
  <g fill="#f8f5ee" font-family="'Noto Serif SC','Songti SC',serif" font-weight="700" filter="url(#shadow)">
    <g font-size="150" letter-spacing="18" filter="url(#ink)">
      <text x="188" y="360">植</text>
      <text x="420" y="360">百</text>
      <text x="188" y="610">信</text>
      <text x="420" y="610">年</text>
      <text x="188" y="860">为</text>
      <text x="420" y="860">初</text>
      <text x="188" y="1110">根</text>
      <text x="420" y="1110">心</text>
    </g>
    <g font-size="42" letter-spacing="8" opacity="0.92" filter="url(#ink)">
      <text transform="translate(128 466) rotate(90)">秦八乙己 · 山景录新也</text>
    </g>
  </g>
  <g transform="translate(146 944)" opacity="0.82">
    <rect width="18" height="18" fill="#9f2f27" stroke="#f8f5ee" stroke-opacity="0.36"/>
    <rect y="34" width="18" height="18" fill="#9f2f27" stroke="#f8f5ee" stroke-opacity="0.36"/>
  </g>
  <path d="M584 1312c18 38 27 47 65 65-38 18-47 27-65 65-18-38-27-47-65-65 38-18 47-27 65-65z" fill="#f8f5ee" opacity="0.38"/>
</svg>
