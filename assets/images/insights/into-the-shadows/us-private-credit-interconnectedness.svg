</style><rect width="1300" height="760" fill="#FCF9F1"/><defs><marker id="arrow-qing" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto"><path d="M0 0 L10 5 L0 10 Z" fill="#3D7070"/></marker><marker id="arrow-red" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto"><path d="M0 0 L10 5 L0 10 Z" fill="#C93B2A"/></marker></defs><rect x="64" y="40" width="10" height="10" fill="#C93B2A"/><text x="88" y="51" class="eyebrow">SYSTEMIC LINKAGES</text><text x="64" y="94" class="title">Interconnections Across US Private Credit</text><text x="64" y="120" class="subtitle">Capital, leverage and distribution channels connect private vehicles to regulated institutions</text><rect x="64" y="158" width="12" height="12" fill="#3D7070"/><text x="86" y="170" class="section-head">Insurance Companies</text><rect x="500" y="158" width="12" height="12" fill="#C93B2A"/><text x="522" y="170" class="section-head">US Shadow Banking</text><rect x="936" y="158" width="12" height="12" fill="#C89A2E"/><text x="958" y="170" class="section-head">Commercial Banks</text><rect x="475" y="205" width="350" height="450" fill="#182524"/><text x="503" y="255" class="eyebrow" style="fill:#C93B2A">PRIVATE CREDIT FUNDS</text><text x="503" y="291" class="box-head" style="fill:#FCF9F1">NON-BANK FINANCIAL INTERMEDIARIES</text><rect x="503" y="340" width="294" height="66" fill="#2A302E" stroke="#D8CEB0" stroke-opacity=".28"/><text x="521" y="366" class="box-head" style="fill:#FCF9F1">Private credit funds</text><text x="521" y="388" class="box-copy-light">Direct lending and special situations</text><rect x="503" y="432" width="294" height="66" fill="#2A302E" stroke="#D8CEB0" stroke-opacity=".28"/><text x="521" y="458" class="box-head" style="fill:#FCF9F1">BDCs</text><text x="521" y="480" class="box-copy-light">Publicly listed private-credit vehicles</text><rect x="503" y="524" width="294" height="66" fill="#2A302E" stroke="#D8CEB0" stroke-opacity=".28"/><text x="521" y="550" class="box-head" style="fill:#FCF9F1">Other NBFIs</text><text x="521" y="572" class="box-copy-light">Securitization and specialty-finance platforms</text><rect x="64" y="205" width="330" height="115" fill="#F1EBDD" stroke="#3D7070" stroke-width="1.5"/><text x="84" y="236" class="box-head" style="fill:#1E4040">Annuities / premiums</text><text x="84" y="263" class="box-copy" text-anchor="start"><tspan x="84" dy="0">PE or private credit gains access</tspan><tspan x="84" dy="20">to inexpensive perpetual capital</tspan></text><path d="M394 262.5 C430 262.5 438 262.5 464 262.5" fill="none" stroke="#3D7070" stroke-width="2.5" marker-end="url(#arrow-qing)"/><rect x="64" y="340" width="330" height="115" fill="#F1EBDD" stroke="#3D7070" stroke-width="1.5"/><text x="84" y="371" class="box-head" style="fill:#1E4040">Direct investments</text><text x="84" y="398" class="box-copy" text-anchor="start"><tspan x="84" dy="0">Senior CLO / ABS tranches and</tspan><tspan x="84" dy="20">direct first-lien financing</tspan></text><path d="M394 397.5 C430 397.5 438 397.5 464 397.5" fill="none" stroke="#3D7070" stroke-width="2.5" marker-end="url(#arrow-qing)"/><rect x="64" y="475" width="330" height="100" fill="#F1EBDD" stroke="#3D7070" stroke-width="1.5"/><text x="84" y="506" class="box-head" style="fill:#1E4040">Indirect investments</text><text x="84" y="533" class="box-copy" text-anchor="start"><tspan x="84" dy="0">Allocations to private credit funds</tspan><tspan x="84" dy="20">and BDCs</tspan></text><path d="M394 525.0 C430 525.0 438 525.0 464 525.0" fill="none" stroke="#3D7070" stroke-width="2.5" marker-end="url(#arrow-qing)"/><rect x="906" y="205" width="330" height="78" fill="#FCF9F1" stroke="#C93B2A" stroke-width="1.5"/><text x="926" y="234" class="box-head" style="fill:#9F2F24">Fund finance</text><text x="926" y="258" class="box-copy" text-anchor="start"><tspan x="926" dy="0">Subscription lines, NAV loans and revolvers</tspan></text><path d="M906 244.0 C872 244.0 858 244.0 836 244.0" fill="none" stroke="#C93B2A" stroke-width="2.5" marker-end="url(#arrow-red)"/><rect x="906" y="295" width="330" height="78" fill="#FCF9F1" stroke="#C93B2A" stroke-width="1.5"/><text x="926" y="324" class="box-head" style="fill:#9F2F24">Private-bank distribution</text><text x="926" y="348" class="box-copy" text-anchor="start"><tspan x="926" dy="0">Private credit funds sold to wealth clients</tspan></text><path d="M906 334.0 C872 334.0 858 334.0 836 334.0" fill="none" stroke="#C93B2A" stroke-width="2.5" marker-end="url(#arrow-red)"/><rect x="906" y="385" width="330" height="88" fill="#FCF9F1" stroke="#C93B2A" stroke-width="1.5"/><text x="926" y="414" class="box-head" style="fill:#9F2F24">Forward-flow origination</text><text x="926" y="438" class="box-copy" text-anchor="start"><tspan x="926" dy="0">Consumer, auto, mortgage and receivable pools</tspan></text><path d="M906 429.0 C872 429.0 858 429.0 836 429.0" fill="none" stroke="#C93B2A" stroke-width="2.5" marker-end="url(#arrow-red)"/><rect x="906" y="485" width="330" height="78" fill="#FCF9F1" stroke="#C93B2A" stroke-width="1.5"/><text x="926" y="514" class="box-head" style="fill:#9F2F24">Direct investments</text><text x="926" y="538" class="box-copy" text-anchor="start"><tspan x="926" dy="0">Senior CLO / ABS and first-lien financing</tspan></text><path d="M906 524.0 C872 524.0 858 524.0 836 524.0" fill="none" stroke="#C93B2A" stroke-width="2.5" marker-end="url(#arrow-red)"/><rect x="906" y="575" width="330" height="80" fill="#FCF9F1" stroke="#C93B2A" stroke-width="1.5"/><text x="926" y="604" class="box-head" style="fill:#9F2F24">Indirect investments</text><text x="926" y="628" class="box-copy" text-anchor="start"><tspan x="926" dy="0">Fund / BDC stakes and second-lien exposure</tspan></text><path d="M906 615.0 C872 615.0 858 615.0 836 615.0" fill="none" stroke="#C93B2A" stroke-width="2.5" marker-end="url(#arrow-red)"/><line x1="64" y1="700" x2="1236" y2="700" stroke="#D8CEB0" stroke-width="1"/><text x="64" y="730" class="source">Arrows show channels through which capital, credit exposure or liquidity enters private-credit vehicles.</text><text x="1236" y="730" class="source" text-anchor="end">Source: ShoreVest, adapted from FEDS Notes</text></svg>