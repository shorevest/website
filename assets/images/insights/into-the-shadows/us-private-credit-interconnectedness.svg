<svg xmlns="http://www.w3.org/2000/svg" width="1300" height="640" viewBox="0 0 1300 640" role="img" aria-label="Interconnections among US shadow banking, insurers and banks">
<style>text{font-family:DIN 2014, Barlow, Arial, Helvetica, sans-serif;fill:#222222}.title{font-size:28px;font-weight:700}.axis{font-size:14px;fill:#666666}.label{font-size:14px;font-weight:600}.small{font-size:12px;fill:#666666}.cell{font-size:14px}.head{font-size:14px;font-weight:700}.boxhead{font-size:14px;font-weight:700}.boxtext{font-size:12px}</style>
