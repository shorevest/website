  <div class="actions">
    <button id="download-png" type="button">Download PNG</button>
    <a href="assets/images/vectorink-vectorizer-result.svg" download="shorevest-mark.svg">Download Website Mark (SVG)</a>
  </div>

  <script>
    const downloadBtn = document.getElementById('download-png');
    const target = document.getElementById('capture-target');

    function waitForFonts() {
      return document.fonts ? document.fonts.ready : Promise.resolve();
    }

    async function downloadPng() {
      await waitForFonts();

      const width = 1536;
      const height = 2048;
      const canvas = document.createElement('canvas');
      canvas.width = width;
      canvas.height = height;
      const ctx = canvas.getContext('2d');

      ctx.fillStyle = '#f6f4f0';
      ctx.fillRect(0, 0, width, height);

      const img = new Image();
      img.src = 'assets/images/vectorink-vectorizer-result.svg';

      await new Promise((resolve, reject) => {
        img.onload = resolve;
        img.onerror = reject;
      });

      const markSize = 360;
      const centerX = width / 2;
      const topY = 620;
      ctx.drawImage(img, centerX - markSize / 2, topY, markSize, markSize);

      ctx.fillStyle = '#161616';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'top';
      ctx.font = "500 176px 'DIN 2014'";
      ctx.fillText('ShoreVest', centerX, topY + markSize + 60);

      ctx.fillStyle = '#666666';
      ctx.font = "500 82px 'Noto Serif SC'";
      const cn = '新 岸 資 本';
      ctx.fillText(cn, centerX, topY + markSize + 300);

      const url = canvas.toDataURL('image/png');
      const link = document.createElement('a');
      link.href = url;
      link.download = 'shorevest-brand-card.png';
      link.click();
    }

    downloadBtn.addEventListener('click', downloadPng);
  </script>
