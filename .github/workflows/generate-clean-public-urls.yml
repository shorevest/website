name: Generate clean public URLs

on:
  push:
    branches:
      - main
      - feature/clean-public-urls
      - hotfix/clean-url-asset-paths

permissions:
  contents: write

jobs:
  generate:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Check out branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Restore files outside the public URL migration
        if: github.ref_name != 'main'
        run: |
          git checkout origin/main -- \
            assets/email/welcome-template.html \
            assets/email/welcome-template-cn.html \
            assets/js/employee-portal/views-cdd-publisher.js \
            templates/media-coverage/media-coverage-print.html

      - name: Generate clean routes
        run: node scripts/generate-clean-public-urls.js

      - name: Remove legacy empty t query parameters
        shell: bash
        run: |
          node <<'NODE'
          const fs = require('fs');
          const { execFileSync } = require('child_process');

          const files = execFileSync('git', ['ls-files', '*.html', '*.js'], { encoding: 'utf8' })
            .split(/\r?\n/)
            .filter(Boolean);

          for (const file of files) {
            let content = fs.readFileSync(file, 'utf8');
            const before = content;

            content = content.replace(
              /if\s*\(\s*url\.origin\s*===\s*location\.origin\s*&&\s*!url\.searchParams\.get\((['"])t\1\)\s*\)/g,
              "if(T&&url.origin===location.origin&&!url.searchParams.get('t'))"
            );

            content = content.replace(
              /if\s*\(\s*!url\.searchParams\.get\((['"])t\1\)\s*\)\s*url\.searchParams\.set\((['"])t\2,\s*T\s*\);/g,
              "if(T&&!url.searchParams.get('t'))url.searchParams.set('t',T);"
            );

            content = content
              .replace(/&t='\+window\.__SVT\+'/g, '')
              .replace(/\?t='\+window\.__SVT\+'/g, '')
              .replace(
                /assets\/js\/insights-new-edition\.js\?v=20260717/g,
                'assets/js/insights-new-edition.js?v=20260721-linkedin-share'
              );

            if (content !== before) fs.writeFileSync(file, content);
          }
          NODE

      - name: Check generated changes
        run: git diff --check

      - name: Commit generated pages
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No generated changes to commit."
            exit 0
          fi
          git commit -m "Regenerate clean URL pages"
          git push origin "HEAD:${GITHUB_REF_NAME}"
