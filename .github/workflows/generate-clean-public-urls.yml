name: Generate clean public URLs

on:
  pull_request:
    paths:
      - 'scripts/generate-clean-public-urls.js'
      - 'scripts/normalize-public-site.cjs'
      - 'assets/js/site-config.js'
      - 'assets/js/sv-navigation.js'
      - '*.html'
      - '**/*.html'
      - 'sitemap.xml'
      - 'assets/data/clean-url-manifest.json'
      - '.github/workflows/generate-clean-public-urls.yml'
  push:
    branches:
      - main
      - feature/clean-public-urls
      - hotfix/clean-url-asset-paths
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    if: github.event_name != 'push' && github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Check out pull request
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Normalize source URLs and publication exclusions
        run: node scripts/normalize-public-site.cjs

      - name: Generate clean routes
        run: node scripts/generate-clean-public-urls.js

      - name: Normalize and validate every public article
        id: article_validation
        continue-on-error: true
        shell: bash
        run: node scripts/normalize-public-site.cjs --validate > article-validation.log 2>&1

      - name: Upload article validation report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: article-validation-report
          path: article-validation.log
          if-no-files-found: error

      - name: Report article validation result
        if: always()
        shell: bash
        run: |
          cat article-validation.log
          if [ "${{ steps.article_validation.outcome }}" != "success" ]; then
            exit 1
          fi

      - name: Check generated changes
        run: git diff --check

  generate:
    if: github.event_name == 'push' && github.actor != 'github-actions[bot]'
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
      - name: Check out branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Restore files outside the public URL migration
        if: github.ref_name != 'main'
        run: |
          git checkout origin/main -- \
            assets/email/welcome-template.html \
            assets/email/welcome-template-cn.html \
            assets/js/employee-portal/views-cdd-publisher.js \
            templates/media-coverage/media-coverage-print.html

      - name: Normalize source URLs and publication exclusions
        run: node scripts/normalize-public-site.cjs

      - name: Generate clean routes
        run: node scripts/generate-clean-public-urls.js

      - name: Normalize and validate every public article
        run: node scripts/normalize-public-site.cjs --validate

      - name: Check generated changes
        run: git diff --check

      - name: Commit generated pages
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No generated changes to commit."
            exit 0
          fi
          git commit -m "Regenerate and validate public article pages"
          git push origin "HEAD:${GITHUB_REF_NAME}"
