name: Generate clean public URLs

on:
  push:
    branches:
      - feature/clean-public-urls

permissions:
  contents: write

jobs:
  generate:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Check out branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Generate clean routes
        run: node scripts/generate-clean-public-urls.js

      - name: Check generated changes
        run: git diff --check

      - name: Commit generated pages
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No generated changes to commit."
            exit 0
          fi
          git commit -m "Generate clean public URL pages"
          git push origin "HEAD:${GITHUB_REF_NAME}"
