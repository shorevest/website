name: Asset Tracing checks

on:
  pull_request:
    paths:
      - 'employee-portal/index.html'
      - 'assets/js/employee-portal/asset-tracing*.js'
      - 'assets/js/employee-portal/views-asset-tracing*.js'
      - 'assets/css/employee-portal-asset-tracing*.css'
      - 'tests/employee-portal-asset-tracing*.test.js'
      - 'docs/employee-portal/ASSET_TRACING_MODULE.md'
      - '.github/workflows/asset-tracing-checks.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  asset-tracing:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Check JavaScript syntax
        run: |
          node --check assets/js/employee-portal/asset-tracing.js
          node --check assets/js/employee-portal/asset-tracing-phase1b.js
          node --check assets/js/employee-portal/asset-tracing-interactions.js
          node --check assets/js/employee-portal/asset-tracing-accessibility.js
          node --check assets/js/employee-portal/views-asset-tracing.js
          node --check assets/js/employee-portal/views-asset-tracing-phase1b.js
          node --check assets/js/employee-portal/views-asset-tracing-report.js

      - name: Run Asset Tracing regression tests
        run: |
          node tests/employee-portal-asset-tracing.test.js
          node tests/employee-portal-asset-tracing-phase1b.test.js
          node tests/employee-portal-asset-tracing-report.test.js
          node tests/employee-portal-asset-tracing-accessibility.test.js

      - name: Re-run portal entry and security checks
        run: |
          node tests/employee-portal-phase2b.test.js
          node tests/security-headers.test.js
