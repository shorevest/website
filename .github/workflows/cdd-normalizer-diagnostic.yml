name: CDD public normalizer diagnostic

on:
  pull_request:
    paths:
      - 'scripts/run-normalize-public-site.cjs'
      - 'scripts/normalize-cdd-publication.cjs'
      - '.github/workflows/cdd-normalizer-diagnostic.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Run generated-site validation
        shell: bash
        run: |
          set +e
          {
            node scripts/run-normalize-public-site.cjs
            node scripts/normalize-cdd-publication.cjs
            node scripts/generate-clean-public-urls.js
            node scripts/normalize-current-page-fragments.cjs
            node scripts/add-insight-social-metadata.cjs
            node scripts/run-normalize-public-site.cjs --validate
          } > cdd-normalizer-diagnostic.txt 2>&1
          status=$?
          cat cdd-normalizer-diagnostic.txt
          echo "$status" > cdd-normalizer-status.txt
          exit 0

      - name: Upload diagnostic
        uses: actions/upload-artifact@v4
        with:
          name: cdd-normalizer-diagnostic
          path: |
            cdd-normalizer-diagnostic.txt
            cdd-normalizer-status.txt
          if-no-files-found: error
