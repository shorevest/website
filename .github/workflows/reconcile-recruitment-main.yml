name: Reconcile recruitment backend with main

on:
  push:
    branches:
      - agent/harden-recruitment-backend
    paths:
      - .github/workflows/reconcile-recruitment-main.yml
  pull_request:
    branches:
      - main
    paths:
      - .github/workflows/reconcile-recruitment-main.yml

permissions:
  contents: write

concurrency:
  group: reconcile-recruitment-main
  cancel-in-progress: false

jobs:
  reconcile:
    if: >-
      (github.event_name == 'push' && github.ref == 'refs/heads/agent/harden-recruitment-backend') ||
      (github.event_name == 'pull_request' && github.head_ref == 'agent/harden-recruitment-backend')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/harden-recruitment-backend
          fetch-depth: 0
          persist-credentials: true

      - name: Merge current main with a restricted conflict policy
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git fetch origin main

          set +e
          git merge --no-commit --no-ff origin/main
          merge_status=$?
          set -e

          if [ "$merge_status" -gt 1 ]; then
            git merge --abort || true
            echo "Unexpected git merge failure: $merge_status"
            exit "$merge_status"
          fi

          if [ "$merge_status" -eq 1 ]; then
            mapfile -t conflicts < <(git diff --name-only --diff-filter=U | sort)
            printf '%s\n' "${conflicts[@]}"

            cat > /tmp/allowed-conflicts.txt <<'EOF'
          .github/workflows/recruitment-functions.yml
          api/recruitment/core/flows.js
          docs/recruitment/PHASE_2B_1_AZURE_FUNCTIONS_BACKEND.md
          infra/recruitment/main.bicep
          package.json
          services/recruitment-functions/package.json
          services/recruitment-functions/src/adapters/blob.js
          services/recruitment-functions/src/adapters/cosmos.js
          services/recruitment-functions/src/appFactory.js
          services/recruitment-functions/src/functions/index.js
          services/recruitment-functions/src/lib/config.js
          services/recruitment-functions/src/lib/http.js
          EOF
            sort -o /tmp/allowed-conflicts.txt /tmp/allowed-conflicts.txt
            printf '%s\n' "${conflicts[@]}" | sort > /tmp/actual-conflicts.txt
            unexpected="$(comm -23 /tmp/actual-conflicts.txt /tmp/allowed-conflicts.txt)"

            if [ -n "$unexpected" ]; then
              echo "Unexpected conflicts; refusing automatic resolution:"
              printf '%s\n' "$unexpected"
              git merge --abort
              exit 1
            fi

            for file in "${conflicts[@]}"; do
              git checkout --ours -- "$file"
              git add -- "$file"
            done
          fi

          if git diff --name-only --diff-filter=U | grep -q .; then
            echo "Unresolved merge conflicts remain."
            git diff --name-only --diff-filter=U
            git merge --abort
            exit 1
          fi

      - name: Verify public recruitment remains disabled
        shell: bash
        run: |
          set -euo pipefail
          node <<'NODE'
          const config = require('./assets/js/site-config.js');
          const roles = require('./assets/data/recruitment/roles.v1.json');
          if (config.careersOpenRolesEnabled !== false) {
            throw new Error('careersOpenRolesEnabled must remain false');
          }
          const enabled = roles.roles.filter((role) => role.application && role.application.enabled === true);
          if (enabled.length) {
            throw new Error(`Role applications unexpectedly enabled: ${enabled.map((role) => role.id).join(', ')}`);
          }
          NODE

      - name: Install dependencies
        run: |
          npm ci
          npm ci --prefix services/recruitment-functions

      - name: Run recruitment and security checks
        run: |
          npm run validate:recruitment
          npm run check:recruitment
          npm run check:security
          npm run test:recruitment
          npm run check:functions
          npm run test:functions

      - name: Compile and lint authoritative recruitment infrastructure
        run: |
          npm run bicep:build:recruitment
          npm run bicep:lint:recruitment

      - name: Commit reconciled branch
        shell: bash
        run: |
          set -euo pipefail
          git diff --check
          git rm .github/workflows/reconcile-recruitment-main.yml
          git add -A
          git commit -m "Merge current main into recruitment backend branch"
          git push origin HEAD:agent/harden-recruitment-backend
