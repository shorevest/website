name: Audit China Debt Dynamics content

on:
  pull_request:
    paths:
      - 'scripts/audit-cdd-content.cjs'
      - 'scripts/normalize-cdd-publication.cjs'
      - 'assets/data/china-debt-dynamics-*.json'
      - 'china-debt-dynamics*.html'
      - 'insights.html'
      - 'insights/index.html'
      - 'insights/china-debt-dynamics/**/index.html'
      - 'assets/data/clean-url-manifest.json'
      - 'sitemap.xml'
      - '.github/workflows/cdd-content-audit.yml'
  push:
    branches:
      - main
    paths:
      - 'scripts/audit-cdd-content.cjs'
      - 'scripts/normalize-cdd-publication.cjs'
      - 'assets/data/china-debt-dynamics-*.json'
      - 'china-debt-dynamics*.html'
      - 'insights.html'
      - 'insights/index.html'
      - 'insights/china-debt-dynamics/**/index.html'
      - 'assets/data/clean-url-manifest.json'
      - 'sitemap.xml'
      - '.github/workflows/cdd-content-audit.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Normalize China Debt Dynamics publication files
        run: node scripts/normalize-cdd-publication.cjs

      - name: Generate clean public routes
        run: node scripts/generate-clean-public-urls.js

      - name: Audit article metadata and archive consistency
        run: node scripts/audit-cdd-content.cjs
