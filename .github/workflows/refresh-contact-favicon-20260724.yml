name: Refresh Contact favicon

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/refresh-contact-favicon-20260724.yml

permissions:
  contents: write

jobs:
  refresh-contact-favicon:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Replace cached favicon references
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          contact_path = Path("contact/index.html")
          contact = contact_path.read_text(encoding="utf-8")
          contact = contact.replace(
              '<!-- ShoreVest favicon: the stable root URL gives search engines one canonical icon. -->\n'
              '<link rel="icon" href="/favicon.ico" sizes="48x48">\n'
              '<link rel="shortcut icon" href="/favicon.ico">\n',
              '<!-- ShoreVest favicon: dated filenames prevent browsers from reusing retired tab artwork. -->\n',
          )
          replacements = {
              "/assets/favicon-shorevest-20260722.svg": "/assets/favicon-shorevest-20260724.svg",
              "/assets/favicon-shorevest-20260722.ico": "/assets/favicon-shorevest-20260724.ico",
              "/assets/favicon-shorevest-20260722-32x32.png": "/assets/favicon-shorevest-20260724-32x32.png",
              "/assets/favicon-shorevest-20260722-16x16.png": "/assets/favicon-shorevest-20260724-16x16.png",
              "/assets/apple-touch-icon-shorevest-20260722.png": "/assets/apple-touch-icon-shorevest-20260724.png",
              "/assets/js/favicon-guard.js?v=20260722-google-search-refresh": "/assets/js/favicon-guard.js?v=20260724-contact-filename-refresh",
          }
          for old, new in replacements.items():
              contact = contact.replace(old, new)
          contact_path.write_text(contact, encoding="utf-8")

          guard_path = Path("assets/js/favicon-guard.js")
          guard = guard_path.read_text(encoding="utf-8")
          guard = guard.replace('var VERSION = "20260724-favicon-runtime-refresh";', 'var VERSION = "20260724-contact-filename-refresh";')
          guard_replacements = {
              'assets/favicon-shorevest-20260722.svg': 'assets/favicon-shorevest-20260724.svg',
              'assets/favicon-shorevest-20260722.ico': 'assets/favicon-shorevest-20260724.ico',
              'assets/favicon-shorevest-20260722-32x32.png': 'assets/favicon-shorevest-20260724-32x32.png',
              'assets/favicon-shorevest-20260722-16x16.png': 'assets/favicon-shorevest-20260724-16x16.png',
              'assets/apple-touch-icon-shorevest-20260722.png': 'assets/apple-touch-icon-shorevest-20260724.png',
          }
          for old, new in guard_replacements.items():
              guard = guard.replace(old, new)
          guard_path.write_text(guard, encoding="utf-8")
          PY

      - name: Commit the cache-proof references
        shell: bash
        run: |
          if git diff --quiet -- contact/index.html assets/js/favicon-guard.js; then
            echo "No changes required"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add contact/index.html assets/js/favicon-guard.js
          git commit -m "Force cache-proof Contact favicon"
          git push
