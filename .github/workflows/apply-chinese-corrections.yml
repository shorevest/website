name: Apply Chinese copy corrections

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - reopened
      - synchronize

permissions:
  contents: write

jobs:
  apply:
    if: github.head_ref == 'agent/correct-chinese-sitewide'
    runs-on: ubuntu-latest
    steps:
      - name: Check out correction branch
        uses: actions/checkout@v4
        with:
          ref: agent/correct-chinese-sitewide
          fetch-depth: 0

      - name: Apply approved Chinese copy
        run: python3 .github/scripts/apply_chinese_corrections.py

      - name: Validate generated changes
        run: |
          git diff --check
          git diff --stat

      - name: Remove one-time automation and commit corrections
        run: |
          rm -f .github/scripts/apply_chinese_corrections.py
          rm -f .github/workflows/apply-chinese-corrections.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Correct Chinese copy sitewide"
          git push
