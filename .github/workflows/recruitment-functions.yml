name: Recruitment Functions CI

on:
  pull_request:
    paths:
      - '.github/workflows/recruitment-functions.yml'
      - 'services/recruitment-functions/**'
      - 'infra/recruitment/**'
      - 'api/recruitment/core/**'
      - 'content/recruitment/**'
      - 'data/recruitment/**'
      - 'schemas/recruitment/**'
      - 'assets/data/recruitment/**'
      - 'docs/recruitment/**'
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm
      - name: Install root dependencies
        run: npm ci
      - name: Install Function dependencies
        run: npm ci
        working-directory: services/recruitment-functions
      - run: npm run validate:recruitment
      - run: npm run check:recruitment
      - run: npm run test:recruitment
      - run: npm run check:security
      - run: npm run check
        working-directory: services/recruitment-functions
      - run: npm run validate:manifest
        working-directory: services/recruitment-functions
      - run: npm test
        working-directory: services/recruitment-functions
      - name: Verify Azure Bicep CLI
        run: az bicep version || az bicep install
      - run: az bicep build --file infra/recruitment/main.bicep
      - run: az bicep build-params --file infra/recruitment/main.bicepparam
      - run: git diff --check
