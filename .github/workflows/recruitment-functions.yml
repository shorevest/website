name: Recruitment Functions CI
on:
  push:
    branches:
      - 'agent/**'
    paths:
      - '.github/workflows/recruitment-functions.yml'
      - 'package.json'
      - 'package-lock.json'
      - 'scripts/validate-recruitment-roles.js'
      - 'scripts/generate-clean-public-urls.js'
      - 'services/recruitment-functions/**'
      - 'api/recruitment/**'
      - 'infra/recruitment/**'
      - 'assets/data/recruitment/**'
      - 'assets/js/recruitment-*.js'
      - 'assets/js/site-config.js'
      - 'assets/css/recruitment-application.css'
      - 'careers.html'
      - 'careers_cn.html'
      - 'careers/**'
      - 'cn/careers/**'
      - 'sitemap.xml'
      - '_headers'
      - 'tests/recruitment*.test.js'
      - 'tests/security-headers.test.js'
  pull_request:
    paths:
      - '.github/workflows/recruitment-functions.yml'
      - 'package.json'
      - 'package-lock.json'
      - 'scripts/validate-recruitment-roles.js'
      - 'scripts/generate-clean-public-urls.js'
      - 'services/recruitment-functions/**'
      - 'api/recruitment/**'
      - 'infra/recruitment/**'
      - 'assets/data/recruitment/**'
      - 'assets/js/recruitment-*.js'
      - 'assets/js/site-config.js'
      - 'assets/css/recruitment-application.css'
      - 'careers.html'
      - 'careers_cn.html'
      - 'careers/**'
      - 'cn/careers/**'
      - 'sitemap.xml'
      - '_headers'
      - 'tests/recruitment*.test.js'
      - 'tests/security-headers.test.js'
  workflow_dispatch:
jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
      - run: npm ci
      - name: Install recruitment function dependencies
        run: npm install --ignore-scripts --no-audit --no-fund --package-lock=false
        working-directory: services/recruitment-functions
      - run: npm run validate:recruitment
      - run: npm run check:recruitment
      - run: npm run test:recruitment
      - run: npm run check:security
      - run: npm run check:functions
      - run: npm run test:functions
      - name: Build and verify immutable Function package
        shell: pwsh
        run: |
          $artifact = 'artifacts/recruitment-functions.zip'
          & ./services/recruitment-functions/scripts/package.ps1 `
            -CommitSha '${{ github.sha }}' `
            -OutputPath $artifact

          if (-not (Test-Path -LiteralPath $artifact -PathType Leaf)) {
            throw 'Recruitment Function archive was not created.'
          }
          if (-not (Test-Path -LiteralPath "$artifact.sha256" -PathType Leaf)) {
            throw 'Recruitment Function archive digest sidecar was not created.'
          }

          Add-Type -AssemblyName System.IO.Compression.FileSystem
          $archive = [System.IO.Compression.ZipFile]::OpenRead((Resolve-Path $artifact))
          try {
            $entries = @($archive.Entries | ForEach-Object { $_.FullName.Replace('\', '/') })
            foreach ($required in @(
              'host.json',
              'package.json',
              'deployment-metadata.json',
              'src/functions/index.js',
              'api/recruitment/core/flows.js',
              'assets/data/recruitment/roles.v1.json',
              'node_modules/@azure/functions/package.json'
            )) {
              if ($entries -notcontains $required) {
                throw "Package is missing required entry: $required"
              }
            }
            if ($entries | Where-Object { $_ -match '^(staging|recruitment-functions)/' }) {
              throw 'Package contains a forbidden wrapper directory.'
            }
            if ($entries | Where-Object { $_ -match '(^|/)(local\.settings|\.env)' }) {
              throw 'Package contains forbidden local configuration.'
            }

            $metadataEntry = $archive.GetEntry('deployment-metadata.json')
            $reader = [System.IO.StreamReader]::new($metadataEntry.Open())
            try {
              $metadata = ($reader.ReadToEnd() | ConvertFrom-Json)
            } finally {
              $reader.Dispose()
            }
            if ($metadata.sourceCommit -ne '${{ github.sha }}') {
              throw 'Deployment metadata commit does not match the workflow head.'
            }
            if ($metadata.payloadSha256 -notmatch '^[0-9a-f]{64}$') {
              throw 'Deployment metadata payload digest is invalid.'
            }
            if ($metadata.archiveSha256Sidecar -ne 'recruitment-functions.zip.sha256') {
              throw 'Deployment metadata sidecar name is invalid.'
            }
          } finally {
            $archive.Dispose()
          }

          $actualHash = (Get-FileHash -LiteralPath $artifact -Algorithm SHA256).Hash.ToLowerInvariant()
          $recordedHash = ((Get-Content -LiteralPath "$artifact.sha256" -Raw).Trim() -split '\s+')[0]
          if ($actualHash -ne $recordedHash) {
            throw 'Archive digest sidecar does not match the generated ZIP.'
          }
      - name: Compile recruitment Bicep
        run: npm run bicep:build:recruitment
      - name: Lint recruitment Bicep
        run: npm run bicep:lint:recruitment
      - run: git diff --check
