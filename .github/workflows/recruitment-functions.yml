name: Recruitment Functions CI
on:
  pull_request:
  workflow_dispatch:
jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm ci
      - name: Install recruitment function dependencies
        run: npm install --ignore-scripts --no-audit --no-fund --package-lock=false
        working-directory: services/recruitment-functions
      - run: npm run validate:recruitment
      - run: npm run check:recruitment
      - run: npm run test:recruitment
      - run: npm run check:security
      - run: npm run check:functions
      - run: npm run test:functions
      - name: Compile recruitment Bicep
        id: bicep
        continue-on-error: true
        shell: bash
        run: |
          set +e
          az bicep build --file infra/recruitment/main.bicep > bicep-output.log 2>&1
          status=$?
          cat bicep-output.log
          echo "status=$status" >> "$GITHUB_OUTPUT"
          exit "$status"
      - name: Upload Bicep diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: recruitment-bicep-diagnostics
          path: bicep-output.log
          if-no-files-found: error
          retention-days: 7
      - name: Lint recruitment Bicep
        if: steps.bicep.outputs.status == '0'
        run: az bicep build --file infra/recruitment/main.bicep --stdout >/dev/null
      - name: Fail when Bicep compilation fails
        if: steps.bicep.outputs.status != '0'
        run: exit 1
      - run: git diff --check
