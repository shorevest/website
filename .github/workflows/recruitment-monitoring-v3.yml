name: Recruitment Monitoring V3

on:
  push:
    branches:
      - 'agent/**'
    paths:
      - '.github/workflows/recruitment-monitoring-v3.yml'
      - 'infra/recruitment/monitoring-rules.v3.bicep'
      - 'services/recruitment-functions/src/**'
      - 'services/recruitment-functions/test/monitoringRulesV3.test.js'
  pull_request:
    paths:
      - '.github/workflows/recruitment-monitoring-v3.yml'
      - 'infra/recruitment/monitoring-rules.v3.bicep'
      - 'services/recruitment-functions/src/**'
      - 'services/recruitment-functions/test/monitoringRulesV3.test.js'
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Validate monitoring v3 contract tests
        run: node --test services/recruitment-functions/test/monitoringRulesV3.test.js
      - name: Compile monitoring Bicep v3
        run: az bicep build --file infra/recruitment/monitoring-rules.v3.bicep
      - name: Lint monitoring Bicep v3
        run: az bicep build --file infra/recruitment/monitoring-rules.v3.bicep --stdout >/dev/null
      - run: git diff --check
