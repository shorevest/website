name: Recruitment Package Diagnostics

on:
  pull_request:
    paths:
      - '.github/workflows/recruitment-package-diagnostics.yml'
      - '.github/workflows/recruitment-functions.yml'
      - 'services/recruitment-functions/scripts/package.ps1'
      - 'services/recruitment-functions/package.json'
      - 'services/recruitment-functions/package-lock.json'
  workflow_dispatch:

jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
      - name: Regenerate recruitment Functions lockfile
        run: npm install --package-lock-only --ignore-scripts --no-audit --no-fund
        working-directory: services/recruitment-functions
      - name: Capture immutable package build output
        id: package
        shell: bash
        run: |
          set +e
          pwsh -NoProfile -File services/recruitment-functions/scripts/package.ps1 \
            -CommitSha '${{ github.sha }}' \
            -OutputPath 'artifacts/recruitment-functions.zip' \
            > recruitment-package.log 2>&1
          status=$?
          echo "exit_code=$status" >> "$GITHUB_OUTPUT"
          exit 0
      - name: Upload generated lockfile and package output
        uses: actions/upload-artifact@v4
        with:
          name: recruitment-package-output
          path: |
            recruitment-package.log
            services/recruitment-functions/package-lock.json
          if-no-files-found: error
          retention-days: 1
      - name: Preserve package failure status
        if: steps.package.outputs.exit_code != '0'
        run: exit 1
