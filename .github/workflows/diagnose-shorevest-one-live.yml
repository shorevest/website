name: Diagnose live ShoreVest One

on:
  pull_request:
    paths:
      - '.github/workflows/diagnose-shorevest-one-live.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: read

jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Inspect GitHub Pages configuration and recent builds
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          mkdir -p artifacts/live-portal
          curl -fsSL \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/pages" \
            > artifacts/live-portal/pages-site.json || true
          curl -fsSL \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/pages/builds?per_page=10" \
            > artifacts/live-portal/pages-builds.json || true
          cat artifacts/live-portal/pages-site.json || true
          cat artifacts/live-portal/pages-builds.json || true

      - name: Fetch the exact live portal and startup assets
        shell: bash
        run: |
          mkdir -p artifacts/live-portal
          DIAG="${GITHUB_SHA}-$(date +%s)"
          curl -sS -L -D artifacts/live-portal/live-index-headers.txt \
            -o artifacts/live-portal/live-index.html \
            "https://shorevest.com/employee-portal/?diag=${DIAG}"
          curl -sS -L -D artifacts/live-portal/live-app-headers.txt \
            -o artifacts/live-portal/live-app.js \
            "https://shorevest.com/assets/js/employee-portal/app.js?diag=${DIAG}"
          curl -sS -L -D artifacts/live-portal/live-guard-headers.txt \
            -o artifacts/live-portal/live-guard.js \
            "https://shorevest.com/assets/js/employee-portal/boot-guard.js?diag=${DIAG}"
          printf '\n--- live build markers ---\n'
          grep -nE 'data-portal-build|boot-guard|employee-portal/app.js' artifacts/live-portal/live-index.html || true
          printf '\n--- response headers ---\n'
          cat artifacts/live-portal/live-index-headers.txt

      - name: Run Chrome against the live URL
        shell: bash
        run: |
          DIAG="${GITHUB_SHA}-$(date +%s)"
          google-chrome --headless=new --no-sandbox --disable-gpu \
            --virtual-time-budget=15000 \
            --window-size=1440,1000 \
            --dump-dom "https://shorevest.com/employee-portal/?diag=${DIAG}" \
            > artifacts/live-portal/live-dom.html \
            2> artifacts/live-portal/live-chrome.log || true
          google-chrome --headless=new --no-sandbox --disable-gpu \
            --virtual-time-budget=15000 \
            --window-size=1440,1000 \
            --screenshot=artifacts/live-portal/live-page.png \
            "https://shorevest.com/employee-portal/?diag=${DIAG}" \
            >> artifacts/live-portal/live-chrome.log 2>&1 || true

      - name: Summarize the live result
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path
          import json
          root = Path('artifacts/live-portal')
          html = (root/'live-index.html').read_text(errors='replace') if (root/'live-index.html').exists() else ''
          dom = (root/'live-dom.html').read_text(errors='replace') if (root/'live-dom.html').exists() else ''
          result = {
              'live_index_bytes': len(html.encode()),
              'has_current_build_marker': 'data-portal-build="20260723b"' in html,
              'has_boot_guard_reference': 'boot-guard.js' in html,
              'has_app_reference': 'employee-portal/app.js' in html,
              'rendered_login': 'login__submit' in dom,
              'rendered_shell': 'ops-shell' in dom,
              'rendered_recovery': 'data-boot-recovery="true"' in dom,
              'still_rendering_loader': 'Loading ShoreVest One' in dom,
              'dom_bytes': len(dom.encode()),
          }
          (root/'summary.json').write_text(json.dumps(result, indent=2) + '\n')
          print(json.dumps(result, indent=2))
          PY

      - name: Upload live diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: shorevest-one-live-diagnostics
          path: artifacts/live-portal/*
          if-no-files-found: error
